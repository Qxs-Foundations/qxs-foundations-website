<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" fill="none">
  <!-- Refined corporate emblem (hollow structural prism in dark slate) -->
  <path d="M12,25 L24,13 L36,25 L24,37 Z" stroke="#080c16" stroke-width="2.5" stroke-linejoin="round" />
  <path d="M17,25 L24,18 L31,25 L24,32 Z" stroke="#080c16" stroke-width="1.2" stroke-linejoin="round" opacity="0.4" />
  
  <!-- QXS: Modern, clean corporate typography in dark slate -->
  <text x="52" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" fill="#080c16" letter-spacing="2">QXS</text>
  
  <!-- FOUNDATIONS: Elegant wide letter-spacing in grey slate -->
  <text x="52" y="41" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="9.5" font-weight="500" fill="#475569" letter-spacing="4.2">FOUNDATIONS</text>
</svg>
